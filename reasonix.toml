# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Bash(Get-ChildItem -Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\" -Filter \"hvigorw*\" | Select-Object FullName)", "Bash(Get-ChildItem -Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\" -Filter \"*.cmd\" -Recurse -Depth 2 | Select-Object -First 5 FullName)", "Bash(if (Test-Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\\node_modules\\.bin\\hvigorw\") { Write-Output \"hvigorw found\" } else { Write-Output \"hvigorw not found\" }; Get-ChildItem -Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\" -Directory | Select-Object Name)", "remember", "Bash(Get-ChildItem -Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\" -Recurse -Filter \"hvigorw*\" -File 2>$null | Select-Object FullName; Get-ChildItem -Path \"D:\\AAAMy_Project\\DevEcoProject\\Echo\" -Recurse -Filter \"hvigor*.bat\" -File 2>$null | Select-Object FullName)", "Bash(if (Test-Path \"C:\\Program Files\\Huawei\\DevEco Studio\") { Write-Output \"DevEco Studio found at Program Files\" }; if (Test-Path \"$env:LOCALAPPDATA\\Huawei\\DevEco Studio\") { Write-Output \"DevEco Studio found at LOCALAPPDATA\" }; Get-ChildItem -Path \"C:\\Program Files\\Huawei\" -ErrorAction SilentlyContinue | Select-Object Name; Get-ChildItem -Path \"D:\\\" -Directory -Filter \"*DevEco*\" -ErrorAction SilentlyContinue | Select-Object FullName)", "Bash(Get-ChildItem -Path \"D:\\DevEco Studio\" -Recurse -Filter \"hvigorw*\" -File -ErrorAction SilentlyContinue | Select-Object -First 3 FullName; Get-ChildItem -Path \"D:\\DevEco Studio\" -Recurse -Filter \"hvigor*.bat\" -File -ErrorAction SilentlyContinue | Select-Object -First 3 FullName; Get-ChildItem -Path \"D:\\DevEco Studio\" -Directory -Depth 1 | Select-Object -First 10 Name)", "Bash(node --version 2>&1; if ($LASTEXITCODE -ne 0) { Write-Output \"Node.js not on PATH\" }; Get-ChildItem -Path \"D:\\DevEco Studio\\tools\\node\" -ErrorAction SilentlyContinue | Select-Object Name; Get-ChildItem -Path \"D:\\DevEco Studio\\tools\\ohpm\" -ErrorAction SilentlyContinue | Select-Object Name)", "Bash(ohpm --version 2>&1; if ($LASTEXITCODE -ne 0) { Write-Output \"ohpm not on PATH, checking...\" }; Get-ChildItem -Path \"D:\\DevEco Studio\\tools\\ohpm\\bin\" -ErrorAction SilentlyContinue | Select-Object Name)", "Bash($jdkDir = Get-ChildItem -Path \"D:\\DevEco Studio\\tools\" -Directory -Filter \"*jdk*\" -ErrorAction SilentlyContinue | Select-Object -First 1; if ($jdkDir) { Write-Output \"JDK found: $($jdkDir.FullName)\" } else { Write-Output \"No JDK dir found\" }; Get-ChildItem -Path \"D:\\DevEco Studio\\tools\" -Directory -ErrorAction SilentlyContinue | Select-Object Name)", "Bash(java -version 2>&1; if ($LASTEXITCODE -ne 0) { Write-Output \"Java not on PATH\" }; Get-ChildItem -Path \"C:\\Program Files\" -Directory -Filter \"*jdk*\" -ErrorAction SilentlyContinue | Select-Object Name; Get-ChildItem -Path \"C:\\Program Files\" -Directory -Filter \"*Java*\" -ErrorAction SilentlyContinue | Select-Object Name; Get-ChildItem -Path \"D:\\\" -Directory -Filter \"*jdk*\" -ErrorAction SilentlyContinue | Select-Object Name)", "Bash(Test-Path \"D:\\DevEco Studio\\tools\\hvigor\\bin\\hvigorw.bat\"; java -version 2>&1 | Select-Object -First 1; Write-Output \"---\"; node --version)", "Bash(& \"D:\\DevEco Studio\\tools\\node\\node.exe\" \"D:\\DevEco Studio\\tools\\hvigor\\bin\\hvigorw.js\" --mode module -p module=entry@default -p product=default -p requiredDeviceType=phone assembleHap --analyze=normal --parallel --incremental --daemon 2>&1)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

